<app-header></app-header>

<div class="login-page">
  <div class="login-container">
    <div class="login-card glass-card">
      <h1>Login 🔐</h1>
      <p class="subtitle">Enter your email</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="Enter your email"
            class="form-control"
            [class.is-invalid]="submitted && email?.invalid"
          >
          <div *ngIf="submitted && email?.invalid" class="alert alert-error">
            <span *ngIf="email?.errors?.['required']">This field is required</span>
            <span *ngIf="email?.errors?.['email']">Please enter a valid email address</span>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="Enter your password"
              class="form-control"
              [class.is-invalid]="submitted && password?.invalid"
            >
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              title="Password"
            >
              {{ showPassword ? '👁️' : '👁️‍🗨️' }}
            </button>
          </div>
          <div *ngIf="submitted && password?.invalid" class="alert alert-error">
            <span *ngIf="password?.errors?.['required']">This field is required</span>
            <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="alert alert-danger">
          {{ errorMessage }}
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn" [disabled]="isLoading">
          {{ isLoading ? 'Loading...' : 'Login' }}
        </button>
      </form>

      <!-- Forgot Password Link -->
      <div class="forgot-password">
        <a routerLink="/forgot-password" class="link-primary">Forgot Password?</a>
      </div>

      <!-- Signup Links -->
      <div class="signup-section">
        <p>Create Account?</p>
        <div class="signup-buttons">
          <a routerLink="/customer-signup" class="btn btn-secondary btn-block">
            💳 Create Donor Account
          </a>
          <a routerLink="/charity-signup" class="btn btn-secondary btn-block">
            🏢 Create Charity Account
          </a>
        </div>
      </div>
    </div>

    <!-- Illustration -->
    <div class="login-illustration">
      <div class="illustration-icon">🔐</div>
    </div>
  </div>
</div>

<app-footer></app-footer>
