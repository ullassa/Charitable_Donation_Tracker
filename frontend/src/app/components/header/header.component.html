<header class="header glass-panel">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">🙌</span>
      <span class="logo-text">CareFund</span>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <a *ngIf="role !== 'charitymanager'" routerLink="/donate" class="nav-link">💳 Donate</a>

      <a routerLink="/impact" class="nav-link">📊 Our Impact</a>
      <a routerLink="/blogs" class="nav-link">📝 Blogs</a>
    </nav>

    <!-- Auth Buttons -->
    <div class="auth-buttons">
      <a *ngIf="!isLoggedIn" routerLink="/login" class="btn btn-secondary">Login</a>
      <a *ngIf="isLoggedIn" routerLink="/profile" class="btn btn-secondary profile-btn">
        <span class="profile-icon" aria-hidden="true"></span>
        Profile
      </a>
      <a *ngIf="isLoggedIn && dashboardLink" [routerLink]="dashboardLink" class="btn btn-secondary">Dashboard</a>
      <button *ngIf="isLoggedIn" type="button" class="btn btn-secondary" (click)="logout()">Logout</button>
    </div>
  </div>
</header>
