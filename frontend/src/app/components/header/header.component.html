<header class="header glass-panel">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">🙌</span>
      <span class="logo-text">CareFund</span>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <div class="nav-item donate-dropdown" (mouseleave)="closeDonateCauses()">
        <button
          type="button"
          class="nav-link"
          (click)="toggleDonateCauses()"
          (focus)="openDonateCauses()"
          [attr.aria-expanded]="donateCausesOpen"
          aria-haspopup="true"
        >
          💳 Donate
          <span class="dropdown-arrow">▼</span>
        </button>
        
        <div class="dropdown-menu glass-panel" *ngIf="donateCausesOpen">
           <a routerLink="/donate" [queryParams]="{ cause: cause.name }"
             *ngFor="let cause of causes"
             class="dropdown-item"
             (click)="closeDonateCauses()">
            {{ cause.name }}
          </a>
        </div>
      </div>

      <a routerLink="/impact" class="nav-link">📊 Our Impact</a>
      <a routerLink="/blogs" class="nav-link">📝 Blogs</a>
    </nav>

    <!-- Auth Buttons -->
    <div class="auth-buttons">
      <a *ngIf="!isLoggedIn" routerLink="/login" class="btn btn-secondary">Login</a>
      <a *ngIf="isLoggedIn" routerLink="/profile" class="btn btn-secondary profile-btn">
        <span class="profile-icon" aria-hidden="true"></span>
        Profile
      </a>
      <button *ngIf="isLoggedIn" type="button" class="btn btn-secondary" (click)="logout()">Logout</button>
    </div>
  </div>
</header>
