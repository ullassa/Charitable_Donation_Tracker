<header class="header">
  <div class="header-container">
    <!-- Logo -->
    <a class="logo" routerLink="/">
      <span class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-7-4.4-9.2-8.7C.9 8.3 3 5 6.7 5c2.1 0 3.7 1.1 4.9 2.8C12.8 6.1 14.4 5 16.5 5 20.2 5 22.3 8.3 21.2 12.3 19 16.6 12 21 12 21Z" />
        </svg>
      </span>
      <span class="logo-text">CareFund</span>
    </a>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <a *ngIf="(auth.state$ | async)?.role?.trim()?.toLowerCase() !== 'charitymanager'" routerLink="/" class="nav-link">Donate</a>

      <a routerLink="/impact" class="nav-link">Our Impact</a>
      <a routerLink="/blogs" class="nav-link">Blogs</a>
      <a routerLink="/about" class="nav-link">About Us</a>
    </nav>

    <!-- Auth Buttons -->
    <div class="auth-buttons">
      <button *ngIf="showStartCharity" type="button" class="btn start-charity-btn" (click)="startCharity()">Start a charity</button>
      <button *ngIf="!(auth.isLoggedIn$ | async)" type="button" class="btn btn-secondary" (click)="openLogin()">Login</button>
      <button *ngIf="auth.isLoggedIn$ | async" type="button" class="btn btn-secondary profile-btn" (click)="openProfile()">
        <span class="profile-icon" aria-hidden="true"></span>
        Profile
      </button>
      <button *ngIf="(auth.isLoggedIn$ | async) && dashboardLink" type="button" class="btn btn-secondary" (click)="openDashboard()">Dashboard</button>
      <button *ngIf="auth.isLoggedIn$ | async" type="button" class="btn btn-secondary" (click)="logout()">Logout</button>
    </div>
  </div>
</header>
